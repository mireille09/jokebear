<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>🍰 實毅大里員工</title>
    <script src="data.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background: #f5f7fa; padding: 15px; margin: 0; }
        
        /* 基礎卡片容器：在電腦版會透過 .wide 撐開 */
        .card { 
            background: white; padding: 25px; border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: block; 
            width: 100%; max-width: 450px; box-sizing: border-box; 
            margin: 10px auto; transition: max-width 0.3s; 
        }
        /* 電腦版撐開後的寬度 */
        .card.wide { max-width: 1200px; }

        /* 搜尋區域 */
        .search-section { max-width: 400px; margin: 0 auto; }
        input { padding: 15px; border: 2px solid #ddd; border-radius: 6px; font-size: 18px; outline: none; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-search { flex: 2; padding: 15px 0; background-color: #4a90e2; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-clear { flex: 1; padding: 15px 0; background-color: #95a5a6; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* 導覽連結 */
        .nav-link { margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; font-size: 14px; line-height: 2.5; display: flex; flex-wrap: wrap; justify-content: center; }
        .nav-link a { color: #4a90e2; text-decoration: none; font-weight: bold; cursor: pointer; margin: 0 10px; white-space: nowrap; }
        .nav-duty { color: #2c3e50 !important; }
        .nav-duty span { color: #27ae60 !important; }

/* 1. 容器：強化水平置中 */
.result-container { 
    display: flex; 
    flex-wrap: wrap; 
    justify-content: center; /* 讓內容物水平置中 */
    align-items: flex-start; 
    gap: 10px; 
    padding: 10px 0; 
    width: 100%; 
    margin: 0 auto; 
}
        /* 員工卡片樣式：邊框已改為黑色 */
       .emp-card { 
    background: #fff; 
    border: 1px solid black; 
    border-radius: 8px; 
    padding: 8px; 
    box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
    box-sizing: border-box; 
    text-align: center; 
    /* 修改這裡：讓手機版維持一行 2 個或自動，重點是下面的電腦版 */
    width: calc((100% - 15px) / 2); 
}
        .emp-card img { width: 100%; height: auto; aspect-ratio: 3 / 4; object-fit: cover; border-radius: 4px; }
        .emp-card .emp-name-tag { font-weight: bold; font-size: 14px; margin-top: 6px; border-bottom: 1px solid #f0f0f0; padding-bottom: 4px; overflow: hidden; text-overflow: ellipsis; }

/* 3. 電腦版：確保 Grid 佈局也置中 */
/* 3. 電腦版：強制定製一行 8 個 */
@media (min-width: 1024px) {
    .result-container { 
        display: grid !important; 
        justify-content: center; 
        /* 修改這裡：將 repeat 的數量固定為 8 */
        grid-template-columns: repeat(8, 1fr) !important; 
        max-width: 1200px; /* 稍微調大一點，讓 8 個卡片有足夠空間 */
        gap: 10px; 
        margin: 0 auto;
    }
    .emp-card { 
        width: 100% !important; 
        padding: 5px; /* 稍微縮小內距，避免 8 個太擠 */
    }
    .emp-card .emp-name-tag {
        font-size: 12px; /* 稍微縮小字體，確保工號名字不折行 */
    }
}
        /* 轉出人員表格 */
        .resigned-table { width: 100%; max-width: 450px; margin: 0 auto; border-collapse: separate; border-spacing: 0; font-size: 15px; background: white; border: 2px solid #636e72; border-radius: 12px; overflow: hidden; }
        .resigned-table th, .resigned-table td { border: 1px solid #ccc; padding: 12px 8px; }

        /* 休假盒子 */
        #off-duty-box { margin: 30px auto 0 auto; padding: 15px; background: #fff0f0; border-radius: 12px; border: 1px solid #ffcccc; text-align: left; font-size: 14px; max-width: 450px; }

        /* 手機斷行控制 */
        @media (max-width: 600px) { .mobile-br { display: block; width: 100%; height: 0; } }
        @media (min-width: 601px) { .mobile-br { display: none; } }
        /* --- 專門控制列印的樣式：強制 8 欄 --- */
@media print {
    /* 1. 設定紙張邊距，讓空間最大化 */
    @page {
        margin: 0.5cm;
    }

    /* 2. 強制容器在列印時固定為 8 欄，不准跑掉 */
    .result-container {
        display: grid !important;
        grid-template-columns: repeat(8, 1fr) !important; 
        gap: 5px !important; /* 縮小間距，確保 8 個排得進去 */
        width: 100% !important;
        max-width: none !important;
    }

    /* 3. 調整卡片在紙張上的細節 */
    .emp-card {
        width: 100% !important;
        padding: 2px !important; /* 極小化內距 */
        border: 1px solid #000 !important;
        page-break-inside: avoid;
    }

    /* 4. 縮小字體，防止名字太長撐開格子 */
    .emp-name-tag {
        font-size: 10px !important;
        white-space: nowrap;
    }

    /* 5. 隱藏列印時不需要的按鈕 */
    .search-section, .nav-link, .btn-group, button, #off-duty-box {
        display: none !important;
    }
}
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div id="page-search">
        <h2 style="color: #2c3e50;">🍰實毅大里員工</h2>
        <div class="search-section">
            <input type="text" id="empId" placeholder="輸入工號或姓名 (空格分隔可多選)" onkeypress="if(event.keyCode==13) doSearch()">
            <div class="btn-group">
                <button class="btn-search" onclick="doSearch()">搜尋</button>
                <button class="btn-clear" onclick="clearSearch()">清空</button>
            </div>
        </div>
        <div id="result-display" class="result-container"></div>
    </div>

    <div id="page-new" style="display:none;">
        <h2 style="color: #27ae60;">🌱 新進同仁</h2>
        <div id="result-new" class="result-container"></div>
    </div>

    <div id="page-resigned" style="display:none;">
        <h2 style="color: #d63031;">🚫 轉出人員名單</h2>
        <table class="resigned-table">
            <thead><tr><th>日期/工地</th><th>轉出人員名單</th></tr></thead>
            <tbody id="resigned-tbody"></tbody>
        </table>
    </div>

    <div id="page-dali" style="display:none;">
        <h2 style="color: #2980b9;">🏢 大里工地員工</h2>
        <div id="result-dali" class="result-container"></div>
    </div>

    <div class="nav-link">
        <a onclick="showPage('search')">🔍 查詢</a>|
        <a onclick="showPage('new')">🌱 新進</a>|
        <a onclick="showPage('resigned')">🚫 轉出</a>|
        <span class="mobile-br"></span>
        <a onclick="showPage('dali')">🏢 大里移工</a>|
        <a href="duty.html" class="nav-duty">♚ <span>月曆</span></a>
    </div>
</div>

<div id="off-duty-box">
    <div style="font-weight:bold; color:#d63031; margin-bottom:8px;">📅 今日休假人員</div>
    <div id="off-list">讀取中...</div>
</div>

<script>
    // 網頁載入時執行今日休假查詢
    window.onload = function() { loadOffDuty(); };

    // 分頁切換邏輯
    function showPage(p) {
        const pages = ['search', 'new', 'resigned', 'dali'];
        pages.forEach(id => {
            const el = document.getElementById('page-' + id);
            if (el) el.style.display = 'none';
        });
        
        const card = document.getElementById('main-card');
        const targetPage = document.getElementById('page-' + p);
        if (targetPage) targetPage.style.display = 'block';

        // 轉出頁面不需要寬版，其他有照片的頁面在電腦版都撐開
        if (p === 'resigned') {
            card.classList.remove('wide');
            loadResigned();
        } else {
            card.classList.add('wide');
            if (p === 'new') loadNewComers();
            if (p === 'dali') renderCards('result-dali', WORKER_DATA);
            // 搜尋頁面的 wide 由 doSearch 觸發，這裡僅預設撐開
        }
    }

    // 渲染員工卡片
    function renderCards(targetId, list) {
        const div = document.getElementById(targetId);
        if (!div) return;
        if (!list || list.length === 0) {
            div.innerHTML = "<div style='width:100%; padding:20px;'>查無相關資料</div>";
            return;
        }
        // 排序：工號由小到大
        list.sort((a, b) => (parseInt(a.id.toString().replace(/\D/g,'')) || 0) - (parseInt(b.id.toString().replace(/\D/g,'')) || 0));
        div.innerHTML = list.map(e => `
            <div class='emp-card'>
                <div class='emp-name-tag'>${e.id} ${e.name}</div>
                <img src='${e.photoUrl}' onerror="this.src='https://via.placeholder.com/150x200?text=No+Photo'">
            </div>
        `).join('');
    }

    // 搜尋功能
    function doSearch() {
        const val = document.getElementById('empId').value.trim();
        if (!val) {
            alert("請輸入工號或姓名");
            return;
        }
        
        const keywords = val.split(/\s+/);
        // ⚠ 確保你的 data.js 中有名為 WORKER_DATA 的陣列
        if (typeof WORKER_DATA === 'undefined') {
            alert("錯誤：無法讀取員工資料(WORKER_DATA missing)");
            return;
        }
        
        // 從 WORKER_DATA 中過濾
        const results = WORKER_DATA.filter(w => 
            keywords.some(k => w.id.toString().includes(k) || w.name.includes(k))
        );
        
        renderCards('result-display', results);
        
        // 搜尋後在電腦版撐開卡片
        if (window.innerWidth >= 1024) {
            document.getElementById('main-card').classList.add('wide');
        }
    }

    // 清空搜尋
    function clearSearch() {
        document.getElementById('empId').value = '';
        document.getElementById('result-display').innerHTML = '';
        // 清空後恢復窄版
        if (window.innerWidth >= 1024) {
             document.getElementById('main-card').classList.remove('wide');
        }
    }

    // 載入新進同仁 (範例工號)
    function loadNewComers() {
        if (typeof WORKER_DATA === 'undefined') return;
        const ids = ["31010", "36074", "36075", "36076", "36077", "36078", "36079", "36080"];
        const res = WORKER_DATA.filter(w => ids.includes(w.id.toString().trim()));
        renderCards('result-new', res);
        
        const container = document.getElementById('result-new');
        if (container && res.length > 0) {
            const breakStyle = 'width: 100%; flex-basis: 100%; color: #e67e22; font-weight: bold; margin: 15px 0; font-size: 18px; grid-column: 1 / -1;';
            container.insertAdjacentHTML('afterbegin', `<div style="${breakStyle}">🚀 04/13, 03/13 新進</div>`);
        }
    }

    // 載入轉出名單
    function loadResigned() {
        const tbody = document.getElementById('resigned-tbody');
        if (!tbody) return;
        // ⚠ 確保你的 data.js 中有名為 RESIGNED_DATA 的陣列
        if (typeof RESIGNED_DATA === 'undefined') {
            tbody.innerHTML = "<tr><td colspan='2'>錯誤：無法讀取轉出資料</td></tr>";
            return;
        }
        
        const groups = {};
        RESIGNED_DATA.forEach(item => {
            const key = `${item.date}_${item.site}`;
            if (!groups[key]) groups[key] = { date: item.date, site: item.site, members: [] };
            if (Array.isArray(item.members)) groups[key].members = groups[key].members.concat(item.members);
            else if (item.member) groups[key].members.push(item.member);
        });
        tbody.innerHTML = Object.values(groups).sort((a,b)=>b.date.localeCompare(a.date)).map(g => `
            <tr><td>${g.date}<br>${g.site}</td><td style="text-align:left; padding-left:15px;">${g.members.join('<br>')}</td></tr>
        `).join('') || "<tr><td colspan='2'>目前無轉出人員</td></tr>";
    }

    // 今日休假查詢
    function loadOffDuty() {
        const offListEl = document.getElementById('off-list');
        if (!offListEl) return;
        // ⚠ 確保你的 data.js 中有名為 LEAVE_DATA 的陣列
        if (typeof LEAVE_DATA === 'undefined') {
            offListEl.innerHTML = "無法讀取休假資料";
            return;
        }
        
        const today = new Date().toISOString().slice(0,10).replace(/-/g,"/");
        const list = LEAVE_DATA.filter(d => today >= d.start && today <= d.end);
        offListEl.innerHTML = list.length ? 
            list.map(e => `${e.id} ${e.name} (${e.start.slice(5)}~${e.end.slice(5)})`).join('<br>') : "今日無人休假";
    }
</script>

</body>
</html>
